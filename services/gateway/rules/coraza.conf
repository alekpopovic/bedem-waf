# BedemWAF Coraza MVP configuration.
#
# This file is intentionally defensive and minimal. It prepares Coraza for
# OWASP CRS-compatible rules without bundling CRS in this repository.

SecRuleEngine DetectionOnly

# Inspect request bodies for MVP request-side protection.
SecRequestBodyAccess On
SecRequestBodyLimit 1048576
SecRequestBodyNoFilesLimit 1048576
SecRequestBodyLimitAction ProcessPartial

# Response body inspection is disabled for the MVP.
SecResponseBodyAccess Off

# Keep audit output controlled by BedemWAF structured audit logs.
SecAuditEngine Off

# Local harmless smoke-test rule. This is useful for validating that Coraza is
# wired correctly without including offensive payload collections.
SecRule REQUEST_HEADERS:X-Bedem-Test "@streq block-me" "id:1000001,phase:1,deny,status:403,log,msg:'BedemWAF harmless test header blocked'"

# OWASP CRS mounting guide:
# Mount CRS files into the gateway container, then uncomment and adjust these
# paths to match the mounted location.
#
# Include /etc/bedemwaf/crs/crs-setup.conf
# Include /etc/bedemwaf/crs/rules/*.conf
