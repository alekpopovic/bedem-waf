services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bedemwaf}
      POSTGRES_USER: ${POSTGRES_USER:-bedemwaf}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bedemwaf_dev_password}
    expose:
      - "5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/000000_init.sql:ro
      - ../services/control-api/internal/db/migrations/000001_init.up.sql:/docker-entrypoint-initdb.d/000001_init.up.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-bedemwaf} -d $${POSTGRES_DB:-bedemwaf}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-bedemwaf}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-bedemwaf}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-bedemwaf_dev_password}
    expose:
      - "8123"
      - "9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./clickhouse/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user \"$${CLICKHOUSE_USER}\" --password \"$${CLICKHOUSE_PASSWORD}\" --query 'SELECT 1'"]
      interval: 10s
      timeout: 5s
      retries: 10

  demo-app:
    build:
      context: ./demo-app
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    expose:
      - "8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  nginx-origin:
    image: nginx:1.27-alpine
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    ports:
      - "${NGINX_ORIGIN_PORT:-9000}:8080"
    volumes:
      - ./nginx-origin/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      demo-app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz | grep -q ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  control-api:
    build:
      context: ../services/control-api
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      BEDEMWAF_CONTROL_API_ADDR: ":8081"
      BEDEMWAF_DATABASE_URL: postgres://${POSTGRES_USER:-bedemwaf}:${POSTGRES_PASSWORD:-bedemwaf_dev_password}@postgres:5432/${POSTGRES_DB:-bedemwaf}?sslmode=disable
      BEDEMWAF_ADMIN_API_KEY: ${BEDEMWAF_ADMIN_API_KEY:-local_dev_admin_key_change_me}
      BEDEMWAF_GATEWAY_API_KEY: ${BEDEMWAF_GATEWAY_API_KEY:-local_dev_gateway_key_change_me}
      BEDEMWAF_CORS_ALLOWED_ORIGINS: ${BEDEMWAF_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
      BEDEMWAF_REQUEST_BODY_LIMIT_BYTES: ${BEDEMWAF_REQUEST_BODY_LIMIT_BYTES:-1048576}
      BEDEMWAF_CLICKHOUSE_URL: http://clickhouse:8123
      BEDEMWAF_CLICKHOUSE_DATABASE: ${CLICKHOUSE_DB:-bedemwaf}
      BEDEMWAF_CLICKHOUSE_USERNAME: ${CLICKHOUSE_USER:-bedemwaf}
      BEDEMWAF_CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-bedemwaf_dev_password}
    ports:
      - "${CONTROL_API_PORT:-8081}:8081"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/readyz | grep -q ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  gateway:
    build:
      context: ../services/gateway
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      BEDEMWAF_GATEWAY_API_KEY: ${BEDEMWAF_GATEWAY_API_KEY:-local_dev_gateway_key_change_me}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-bedemwaf_dev_password}
    command: ["-config", "/app/config/config.compose.yaml"]
    ports:
      - "${GATEWAY_PORT:-8080}:8080"
    volumes:
      - ./gateway/config.compose.yaml:/app/config/config.compose.yaml:ro
    depends_on:
      redis:
        condition: service_healthy
      control-api:
        condition: service_healthy
      nginx-origin:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ../services/worker
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
      BEDEMWAF_DATABASE_URL: postgres://${POSTGRES_USER:-bedemwaf}:${POSTGRES_PASSWORD:-bedemwaf_dev_password}@postgres:5432/${POSTGRES_DB:-bedemwaf}?sslmode=disable
      BEDEMWAF_RULES_DIR: /rules
      BEDEMWAF_WORKER_METRICS_ADDR: ":9092"
    expose:
      - "9092"
    volumes:
      - ./rules:/rules:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  dashboard:
    build:
      context: ../dashboard
      args:
        NEXT_PUBLIC_CONTROL_API_URL: ${NEXT_PUBLIC_CONTROL_API_URL:-http://localhost:8081}
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    environment:
      NEXT_PUBLIC_CONTROL_API_URL: ${NEXT_PUBLIC_CONTROL_API_URL:-http://localhost:8081}
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      control-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/login >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 10

  prometheus:
    image: prom/prometheus:v2.55.1
    profiles: ["observability"]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      gateway:
        condition: service_healthy
      control-api:
        condition: service_healthy
      worker:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready | grep -q Prometheus"]
      interval: 10s
      timeout: 5s
      retries: 10

  grafana:
    image: grafana/grafana:11.3.0
    profiles: ["observability"]
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
  prometheus_data:
  grafana_data:
