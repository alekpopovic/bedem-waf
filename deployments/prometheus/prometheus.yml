global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: bedemwaf-gateway
    metrics_path: /metrics
    static_configs:
      - targets: ["gateway:8080"]

  - job_name: bedemwaf-control-api
    metrics_path: /metrics
    static_configs:
      - targets: ["control-api:8081"]

  - job_name: bedemwaf-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["worker:9092"]
